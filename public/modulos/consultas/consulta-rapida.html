<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta Rápida - Hospital San José</title>
    <link rel="stylesheet" href="../../css/styles.css">
    <link rel="stylesheet" href="../../css/registro-pacientes.css">
    <link rel="stylesheet" href="../../css/seguimiento-pacientes.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="main-wrapper">
        <main class="page-content" id="page-content">

            <!-- SECCION DE FILTROS (DISEÑO SEGUIMIENTO) -->
            <div class="search-filters-container" id="search-filters">
                <div class="filter-group">
                    <label>DNI</label>
                    <input type="text" id="filter-dni" class="filter-input" placeholder="Buscar por DNI..." oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                </div>
                <div class="filter-group">
                    <label>Historia Clínica</label>
                    <input type="text" id="filter-hc" class="filter-input" placeholder="Buscar por HC..." oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                </div>
                <div class="filter-group">
                    <label>Apellidos</label>
                    <input type="text" id="filter-apellidos" class="filter-input" placeholder="Buscar por apellidos...">
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-module primary" id="btn-search" style="padding: 10px 20px;"><i class="fa-solid fa-magnifying-glass"></i> Buscar</button>
                    <button class="btn-module btn-clear-hover" id="btn-clear" style="padding: 8px 15px; background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; font-weight: 500;">Limpiar Filtro</button>
                </div>
            </div>
            
            <!-- BARRA DE ACCIONES RPA -->
            <div id="actions-bar" style="margin-top: 20px; background: white; padding: 15px 20px; border-radius: 10px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center;">
                <span style="font-weight: 500; color: #64748b; font-size: 14px;">
                    <span id="selected-count" style="font-weight: 700; color: #000;">0</span> PACIENTES SELECCIONADOS / M&#193;XIMO 2 REGISTROS
                </span>
                <button class="btn-module shadow btn-matte-black" id="btn-validar" disabled style="padding: 10px 20px; font-weight: 600; background: #404040 !important;">
                    Ejecutar Validaci&#243;n
                    <i id="validar-spinner" class="fa-solid fa-circle-notch fa-spin" style="display:none; margin-left:8px;"></i>
                </button>
            </div>

            <!-- BLOQUEO DE PANTALLA (Solo fondo y desenfoque) -->
            <div id="blocking-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.4); backdrop-filter:blur(6px); z-index:9999; cursor:wait;">
            </div>

            <!-- LISTA DE RESULTADOS -->
            <div id="view-resultados" style="margin-top: 20px;">
                <div class="data-table-container">
                    <div id="loading-indicator" style="display: none; text-align: center; padding: 40px; color: #3b82f6;">
                        <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 2rem;"></i>
                        <p style="margin-top: 10px; font-weight: 500;">Buscando pacientes...</p>
                    </div>
                    <table class="data-table" id="table-pacientes" style="display: none;">
                        <thead>
                            <tr>
                                <th style="width: 50px; text-align: center;">&#10003;</th>
                                <th>DNI</th>
                                <th>Paciente</th>
                                <th>N&#186; HC</th>
                                <th>Seguro Declarado</th>
                                <th>Seguro Extra&#237;do</th>
                                <th>Estado</th>
                                <th>&#218;lt. Validaci&#243;n</th>
                                <th style="width: 60px; text-align: center;">&#8635;</th>
                            </tr>
                        </thead>
                        <tbody id="tbody-pacientes"></tbody>
                    </table>
                </div>
                <div class="pagination-controls" id="pagination-consulta"></div>
            </div>



            <!-- MODAL CAMBIO COBERTURA -->
            <div id="modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:999; justify-content:center; align-items:center;">
                <div style="background:white; border-radius:12px; width:90%; max-width:520px; box-shadow:0 25px 50px -12px rgba(0,0,0,0.25); overflow:hidden; animation:slideUp 0.3s ease;">
                    <div style="padding:20px 25px; border-bottom:1px solid #f1f5f9; display:flex; justify-content:space-between; align-items:center;">
                        <h3 style="margin:0; font-size:16px; color:#0f172a; font-weight:700;">
                            <i class="fa-solid fa-shield-halved" style="color:#3b82f6; margin-right:8px;"></i>Cambio de Cobertura
                        </h3>
                        <button id="modal-close" style="background:none; border:none; cursor:pointer; color:#94a3b8; font-size:18px; padding:4px;">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                    </div>
                    <div style="padding:25px;">
                        <div style="background:#f8fafc; border:1px solid #e2e8f0; border-radius:8px; padding:12px 15px; margin-bottom:20px;">
                            <div style="font-size:12px; color:#94a3b8; font-weight:600; text-transform:uppercase; margin-bottom:4px;">Paciente</div>
                            <div id="modal-paciente-nombre" style="font-weight:600; color:#0f172a;"></div>
                            <div id="modal-paciente-info" style="font-size:12px; color:#64748b; margin-top:2px;"></div>
                        </div>

                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:15px;">
                            <div class="input-stacked">
                                <label style="font-size:13px; font-weight:600; color:#475569; margin-bottom:6px; display:block;">Seguro Actual</label>
                                <input type="text" id="modal-seguro-actual" class="standard-input" readonly style="background:#f8fafc; cursor:not-allowed; opacity:0.7;">
                            </div>
                            <div class="input-stacked">
                                <label style="font-size:13px; font-weight:600; color:#475569; margin-bottom:6px; display:block;">Seguro Extra&#237;do (RPA)</label>
                                <input type="text" id="modal-seguro-extraido" class="standard-input" readonly style="background:#f0fdf4; border-color:#86efac; color:#15803d; font-weight:600;">
                            </div>
                        </div>

                        <div class="input-stacked" style="margin-bottom:15px;">
                            <label style="font-size:13px; font-weight:600; color:#475569; margin-bottom:6px; display:block;">Nuevo Tipo de Seguro *</label>
                            <select id="modal-nuevo-seguro" class="standard-input" required>
                                <option value="" disabled selected hidden>Seleccione</option>
                                <option value="EsSalud">EsSalud</option>
                                <option value="SIS">SIS</option>
                                <option value="Saludpol">Saludpol</option>
                                <option value="SOAT">SOAT</option>
                                <option value="Privado">Privado</option>
                                <option value="Otros">Otros</option>
                            </select>
                        </div>

                        <div class="input-stacked" style="margin-bottom:20px;">
                            <label style="font-size:13px; font-weight:600; color:#475569; margin-bottom:6px; display:block;">Observaci&#243;n</label>
                            <textarea id="modal-observacion" class="standard-input" rows="2" placeholder="Descripci&#243;n breve del cambio..."></textarea>
                        </div>

                        <button id="modal-guardar" class="btn-module primary" style="width:100%; padding:12px; font-weight:600;">
                            <i class="fa-solid fa-save" style="margin-right:6px;"></i>
                            <span id="modal-guardar-text">Actualizar Cobertura</span>
                            <i id="modal-spinner" class="fa-solid fa-circle-notch fa-spin" style="display:none; margin-left:8px;"></i>
                        </button>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <!-- TEMPLATES PARA ENCABEZADO -->
    <template id="template-alerta">
        <div id="alerta-banner" style="display:flex; background:#fff5f5; border:1px solid #fee2e2; border-radius:30px; padding:6px 20px; align-items:center; gap:10px; box-shadow:0 10px 15px -3px rgba(239, 68, 68, 0.1), 0 4px 6px -4px rgba(239, 68, 68, 0.1); animation:fluidSlideDown 0.5s cubic-bezier(0.16, 1, 0.3, 1); pointer-events:auto; border: 1.5px solid #fecaca;">
            <i class="fa-solid fa-circle-exclamation" style="color:#ef4444; font-size:14px;"></i>
            <span style="font-weight:700; color:#b91c1c; font-size:12px; white-space:nowrap; text-transform:uppercase; letter-spacing:0.8px;">Realizar Alta Administrativa</span>
        </div>
    </template>

    <template id="template-progreso">
        <div id="progreso-banner" style="display:flex; background:#eff6ff; border:1px solid #dbeafe; border-radius:30px; padding:6px 20px; align-items:center; gap:10px; box-shadow:0 10px 15px -3px rgba(59, 130, 246, 0.1), 0 4px 6px -4px rgba(59, 130, 246, 0.1); animation:fluidSlideDown 0.5s cubic-bezier(0.16, 1, 0.3, 1); pointer-events:auto; border: 1.5px solid #bfdbfe;">
            <i class="fa-solid fa-robot" style="color:#3b82f6; font-size:14px;"></i>
            <span style="font-weight:700; color:#1d4ed8; font-size:12px; white-space:nowrap; text-transform:uppercase; letter-spacing:0.8px;">Validando: <span id="countdown-val">15</span> Segundos restantes</span>
        </div>
    </template>

    <style>
        @keyframes fluidSlideDown {
            0% { opacity:0; transform:translate(-50%, -100%) scale(0.95); }
            100% { opacity:1; transform:translate(-50%, -50%) scale(1); }
        }
        @keyframes loadingMove {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(350%); }
        }
        .row-alerta { background: #fff5f5 !important; }
        .row-alerta:hover { background: #fee2e2 !important; }
        .btn-revalidar:hover { background: #f1f5f9 !important; border-color: #3b82f6 !important; }
    </style>

    <script src="../../js/supabase-config.js"></script>
    <script src="../../js/layout.js"></script>
    <script src="consulta-rapida.js"></script>
</body>
</html>
