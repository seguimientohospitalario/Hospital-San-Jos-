<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seguimiento de Pacientes - Hospital San Jos&#233;</title>
    <link rel="stylesheet" href="../../css/styles.css">
    <link rel="stylesheet" href="../../css/registro-pacientes.css">
    <link rel="stylesheet" href="../../css/seguimiento-pacientes.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="main-wrapper">
        <main class="page-content" id="page-content">

            <!-- SECCION DE FILTROS (DISEÑO VERIFICACION) -->
            <div class="search-filters-container" id="search-filters">
                <div class="filter-group">
                    <label>DNI o Historia Cl&#237;nica</label>
                    <input type="text" id="filter-dni-hc" class="filter-input" placeholder="Buscar DNI o HC..." oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                </div>
                <div class="filter-group">
                    <label>Apellidos</label>
                    <input type="text" id="filter-apellidos" class="filter-input" placeholder="Buscar por apellidos...">
                </div>
                <div class="filter-group">
                    <label>Tipo de Seguro</label>
                    <select id="filter-seguro" class="filter-input">
                        <option value="">TODOS</option>
                        <option value="EsSalud">ESSALUD</option>
                        <option value="SIS">SIS</option>
                        <option value="Saludpol">SALUDPOL</option>
                        <option value="SOAT">SOAT</option>
                        <option value="Privado">PRIVADO</option>
                        <option value="Otros">OTROS</option>
                    </select>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-module primary" id="btn-search" style="padding: 10px 20px;"><i class="fa-solid fa-magnifying-glass"></i> Buscar</button>
                    <button class="btn-module btn-clear-hover" id="btn-clear" style="padding: 8px 15px; background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; font-weight: 500;">Limpiar Filtro</button>
                </div>
            </div>

            <!-- LISTA DE RESULTADOS -->
            <div id="view-resultados" style="margin-top: 20px;">
                <div class="data-table-container">
                    <div id="loading-indicator" style="display: none; text-align: center; padding: 40px; color: #3b82f6;">
                        <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 2rem;"></i>
                        <p style="margin-top: 10px; font-weight: 500;">Cargando pacientes...</p>
                    </div>
                    <table class="data-table" id="table-pacientes" style="display: none;">
                        <thead>
                            <tr>
                                <th>DNI</th>
                                <th>Paciente</th>
                                <th>N&#186; Historia</th>
                                <th>Tipo de Seguro</th>
                                <th>Servicio</th>
                                <th>Condici&#243;n</th>
                                <th style="text-align: center; width: 100px;">Acci&#243;n</th>
                            </tr>
                        </thead>
                        <tbody id="tbody-pacientes"></tbody>
                    </table>
                </div>
                <!-- Paginación opcional si la implementas en JS -->
                <div id="pagination-container" class="pagination-controls" style="margin-top: 20px;"></div>
            </div>

            <!-- SECCION DE TIMELINE (OCULTA POR DEFECTO - DISEÑO VERIFICACION) -->
            <div id="view-timeline" style="display: none; margin-top: 20px; animation: slideUp 0.4s ease-out;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <div>
                        <button id="btn-back-to-list" class="btn-module shadow" style="background: white; color: #1e293b; border: 1px solid #e2e8f0; cursor: pointer; display: inline-flex; align-items: center; gap: 8px;">
                            <i class="fa-solid fa-arrow-left"></i> Volver a la Lista
                        </button>
                    </div>
                </div>

                <!-- Banner del paciente -->
                <div class="patient-info-banner">
                    <div class="banner-details">
                        <h4 id="banner-paciente-nombre">PACIENTE</h4>
                        <p id="banner-paciente-info">DNI | HC | SERVICIO</p>
                    </div>
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <div id="banner-dias" class="dias-badge">0 d&#237;as</div>
                        <div id="banner-condicion" class="condicion-badge">Hospitalizado</div>
                    </div>
                </div>

                <!-- Timeline -->
                <div class="timeline-section">
                    <div class="timeline-header">
                        <h3><i class="fa-solid fa-timeline" style="color: #3b82f6; margin-right: 10px;"></i>L&#237;nea de Tiempo Cl&#237;nica</h3>
                    </div>
                    <div class="timeline-container" id="timeline-container">
                        <p class="timeline-empty" id="timeline-empty" style="display: none;">No hay eventos registrados para este paciente.</p>
                        <!-- Eventos cargados por JS -->
                    </div>
                </div>

                <!-- Formulario de nuevo evento -->
                <div class="event-form-section">
                    <h3 class="event-form-title"><i class="fa-solid fa-plus-circle" style="color: #3b82f6; margin-right: 10px;"></i>Registrar Nuevo Evento</h3>
                    <form id="event-form" class="event-form">
                        <div class="event-form-grid">
                            <div class="input-stacked">
                                <label>Tipo de Evento *</label>
                                <select id="evento-tipo" class="standard-input" required>
                                    <option value="" disabled selected hidden>Seleccione</option>
                                    <option value="Cambio Cobertura">Cambio Cobertura</option>
                                    <option value="Cambio de Servicio">Cambio de Servicio</option>
                                    <option value="Alta">Alta</option>
                                    <option value="Fallecido">Fallecido</option>
                                </select>
                            </div>
                            <!-- CAMPOS DINAMICOS -->
                            <div class="input-stacked" id="grupo-servicio-de" style="display: none;">
                                <label>De (Servicio Actual) *</label>
                                <input type="text" id="evento-servicio-de" class="standard-input" readonly style="background: #f8fafc;">
                            </div>
                            <div class="input-stacked" id="grupo-servicio-hacia" style="display: none;">
                                <label>Hacia (Nuevo Servicio) *</label>
                                <select id="evento-servicio-hacia" class="standard-input">
                                    <option value="" disabled selected hidden>Seleccione</option>
                                    <option value="Shock trauma">Shock trauma</option>
                                    <option value="Salud mental">Salud mental</option>
                                    <option value="UVI">UVI</option>
                                    <option value="Medicina">Medicina</option>
                                    <option value="Cirugía">Cirugía</option>
                                    <option value="Pediatría">Pediatría</option>
                                    <option value="Neonatología">Neonatología</option>
                                    <option value="Ginecología">Ginecología</option>
                                    <option value="Puerperio">Puerperio</option>
                                </select>
                            </div>
                            <div class="input-stacked" id="grupo-nuevo-seguro" style="display: none;">
                                <label>Nuevo Tipo de Seguro *</label>
                                <select id="evento-nuevo-seguro" class="standard-input">
                                    <option value="" disabled selected hidden>Seleccione</option>
                                    <option value="EsSalud">EsSalud</option>
                                    <option value="SIS">SIS</option>
                                    <option value="Saludpol">Saludpol</option>
                                    <option value="SOAT">SOAT</option>
                                    <option value="Privado">Privado</option>
                                    <option value="Otros">Otros</option>
                                </select>
                            </div>
                            <div class="input-stacked" id="grupo-nuevo-seguro-otros" style="display: none;">
                                <label>Especificar Seguro</label>
                                <input type="text" id="evento-nuevo-seguro-otros" class="standard-input">
                            </div>
                            <div class="input-stacked" style="grid-column: 1 / -1;">
                                <label>Detalle / Observaci&#243;n</label>
                                <textarea id="evento-detalle" class="standard-input" rows="2" placeholder="Descripci&#243;n breve del evento..."></textarea>
                            </div>
                        </div>
                        <div style="display: flex; gap: 10px; margin-top: 20px;">
                            <button type="submit" class="btn-module primary" id="btn-registrar-evento" style="padding: 12px 25px;">
                                <i class="fa-solid fa-save"></i>
                                <span id="registrar-text">Registrar Evento</span>
                                <i id="registrar-spinner" class="fa-solid fa-circle-notch fa-spin" style="display:none; margin-left:8px;"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>



        </main>
    </div>

    <script src="../../js/supabase-config.js"></script>
    <script src="../../js/layout.js"></script>
    <script src="../../js/seguimiento-pacientes.js"></script>
</body>
</html>
