<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seguimiento de Pacientes - Hospital San Jos&#233;</title>
    <link rel="stylesheet" href="../../css/styles.css">
    <link rel="stylesheet" href="../../css/registro-pacientes.css">
    <link rel="stylesheet" href="../../css/seguimiento-pacientes.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="main-wrapper">
        <main class="page-content" id="page-content">

            <!-- SECCION DE FILTROS (DISE&#209;O VERIFICACION) -->
            <div class="search-filters-container" id="search-filters">
                <div class="filter-group">
                    <label>DNI o Historia Cl&#237;nica</label>
                    <input type="text" id="filter-dni-hc" class="filter-input" placeholder="Buscar DNI o HC..." oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                </div>
                <div class="filter-group">
                    <label>Apellidos</label>
                    <input type="text" id="filter-apellidos" class="filter-input" placeholder="Buscar por apellidos...">
                </div>
                <div class="filter-group">
                    <label>Tipo de Seguro</label>
                    <select id="filter-seguro" class="filter-input">
                        <option value="">TODOS</option>
                        <option value="EsSalud">ESSALUD</option>
                        <option value="SIS">SIS</option>
                        <option value="Saludpol">SALUDPOL</option>
                        <option value="SOAT">SOAT</option>
                        <option value="Privado">PRIVADO</option>
                        <option value="Otros">OTROS</option>
                    </select>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn-module primary" id="btn-search" style="padding: 10px 20px;"><i class="fa-solid fa-magnifying-glass"></i> Buscar</button>
                    <button class="btn-module btn-clear-hover" id="btn-clear" style="padding: 8px 15px; background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; font-weight: 500;">Limpiar Filtro</button>
                </div>
            </div>

            <!-- LISTA DE RESULTADOS -->
            <div id="view-resultados" style="margin-top: 20px;">
                <div class="data-table-container">
                    <div id="loading-indicator" style="display: none; text-align: center; padding: 40px; color: #3b82f6;">
                        <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 2rem;"></i>
                        <p style="margin-top: 10px; font-weight: 500;">Cargando pacientes...</p>
                    </div>
                    <table class="data-table" id="table-pacientes" style="display: none;">
                        <thead>
                            <tr>
                                <th>DNI</th>
                                <th>Paciente</th>
                                <th>N&#186; Historia</th>
                                <th>Tipo de Seguro</th>
                                <th>Servicio</th>
                                <th>Condici&#243;n</th>
                                <th style="text-align: center;">ACCI&#211;N</th>
                            </tr>
                        </thead>
                        <tbody id="tbody-pacientes"></tbody>
                    </table>
                </div>
                <!-- Paginación opcional si la implementas en JS -->
                <div id="pagination-container" class="pagination-controls" style="margin-top: 20px;"></div>
            </div>





        </main>
    </div>

    <script src="../../js/supabase-config.js"></script>
    <script src="../../js/layout.js"></script>
    <script src="../../js/seguimiento-pacientes.js"></script>
</body>
</html>
