<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B&#250;squeda Pacientes - Hospital San Jos&#233;</title>
    <link rel="stylesheet" href="../../css/styles.css">
    <link rel="stylesheet" href="../../css/registro-pacientes.css">
    <link rel="stylesheet" href="../../css/verificacion-paciente.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="main-wrapper">
        <main class="page-content" id="page-content">

            <!-- BARRA DE OPERACIONES -->
            <div class="module-commands">
                <div style="display: flex; gap: 10px; align-items: center;">
                    <div class="global-search-box" style="width: 380px; display: flex; align-items: center; background: #ffffff; border-radius: 8px; border: 1px solid #e2e8f0; padding: 0 15px;">
                        <i class="fa-solid fa-magnifying-glass" style="color: #64748b;"></i>
                        <input type="text" id="search-input" placeholder="Buscar por DNI, apellidos o nombres..." class="global-search-input" style="border: none; padding: 12px 10px; outline: none; flex: 1; min-width: 0;">
                    </div>
                    <button class="btn-module primary" id="btn-search" style="padding: 10px 20px;"><i class="fa-solid fa-search"></i> Buscar</button>
                    <button class="btn-module btn-clear-hover" id="btn-clear" style="background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; padding: 8px 15px; font-weight: 500;">Limpiar Filtro</button>
                </div>
            </div>

            <!-- TABLA DE PACIENTES -->
            <div id="view-lista" style="margin-top: 20px;">
                <div class="data-table-container">
                    <div id="loading-indicator" style="display: none; text-align: center; padding: 40px; color: #3b82f6;">
                        <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 2rem;"></i>
                        <p style="margin-top: 10px; font-weight: 500;">Cargando pacientes...</p>
                    </div>

                    <table class="data-table" id="table-element">
                        <thead>
                            <tr>
                                <th>DNI</th>
                                <th>Paciente</th>
                                <th>N&#186; Historia</th>
                                <th>Tipo de Seguro</th>
                                <th>Condici&#243;n</th>
                                <th>D&#237;as Hospitalizado</th>
                                <th style="text-align: center; width: 100px;">Acci&#243;n</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-pacientes">
                        </tbody>
                    </table>
                </div>
                <div id="pagination-container" class="pagination-controls"></div>
            </div>

            <!-- SECCION DE HISTORIAL (MISMA PAGINA) -->
            <div id="view-history-inline" style="display: none; margin-top: 30px; border-top: 2px solid #e2e8f0; padding-top: 30px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h3 id="history-patient-name" style="font-weight: 800; color: #0f172a;">HISTORIAL CLÍNICO</h3>
                    <button class="btn-module" id="btn-close-history" style="background: #f1f5f9; color: #64748b;"><i class="fa-solid fa-xmark"></i> Cerrar Historial</button>
                </div>

                <!-- KPIs -->
                <div id="history-kpis" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 25px;">
                    <!-- Cargado por JS -->
                </div>

                <!-- Botones de Registros -->
                <div id="history-records-buttons" style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
                    <!-- Cargado por JS -->
                </div>

                <!-- Timeline renderizada aquí -->
                <div class="timeline-section" style="background: #f8fafc; border-radius: 12px; padding: 20px; border: 1px solid #e2e8f0;">
                    <div id="history-timeline-container" class="timeline-container">
                        <!-- Cargado por JS -->
                    </div>
                </div>
            </div>

            <!-- Toast -->
            <div id="toast" class="toast-success" style="display: none;">
                <i class="fa-solid fa-check-circle" id="toast-icon"></i>
                <span id="toast-text"></span>
            </div>

        </main>
    </div>

    <script src="../../js/supabase-config.js"></script>
    <script src="../../js/layout.js"></script>
    <script src="../../js/dynamic-table.js"></script>
    <script src="../../js/seguimiento-pacientes.js"></script>
</body>
</html>
